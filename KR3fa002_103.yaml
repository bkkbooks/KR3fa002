body:
  text: 趙君卿注曰勾實之矩以股弦差為廣股弦並為袤而股實方其裏減矩勾之實於弦實開其餘即股倍股在兩邊為從法開矩勾之角即股弦差加股為弦以差除勾實得股弦並以並除勾實亦得股弦差令並自乘與勾實為實倍並為法所得亦弦色實減並自乘如法為股載堉圖解曰股弦差即今算家所謂股弦
