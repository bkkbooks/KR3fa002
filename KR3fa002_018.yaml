body:
  text: 圍三徑一圖解內徑一尺而六面各五寸五六三十是名圍三徑一夫圍三徑一乃六角田之圍徑內層是也外層圓田則非圍三徑一觀此圖雖愚夫愚婦可以知其理矣善筭名家返執守之認爲圓率豈非最謬也哉
