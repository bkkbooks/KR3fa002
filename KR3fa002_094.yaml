body:
  text: 趙君卿注曰按弦圖又可以勾股相乘為朱實二倍之為朱實四以勾股之差自相乘為中黃實加差實亦成弦實以差實減弦實半其餘以差為從法開方除之復得勾矣加差於勾即股凡並勾股之實即成弦實或矩於內或方於外形詭而量均體殊而數齊載堉圖解曰按君即古注文義深奧讀者
