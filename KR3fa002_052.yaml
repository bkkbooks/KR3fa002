body:
  text: 載堉圖解曰今有方池一所每面方五尺欲要改爲圓池問圓池周徑各幾何荅曰周二丈二尺二寸二分二釐二毫二絲二忽二微徑七尺寸七分一釐毫六絲七忽六微法曰置方五尺以四十乗之九歸得二丈二尺二寸二分有奇卽周又置方五尺以一尺四寸一分四釐二毫一絲三忽五微六纖乗之一尺除之所得卽徑
