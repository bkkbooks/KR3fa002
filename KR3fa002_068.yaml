body:
  text: 載堉圖解曰今有方池一所每面方九尺欲要改為圓池問圓池周徑各幾何答曰周四丈惟此圖無餘分徑一丈二尺七寸二分七釐九毫二絲二忽微法曰置方九尺以四十乘之九歸得四丈即周又置方九尺以一尺四寸一分四釐二毫一絲三忽五微六纖乘之一尺除之所得即徑商高謂圓出於方方出於矩矩出於九九八十一者即此
