body:
  text: 出於方方出於矩矩出於九九八十一又曰環矩以爲圓合矩以爲方方屬地圓屬天天圓地方方數爲典以方出圓今詳其意謂書方形若棋盤紋每行九寸九行共有八十一寸却於四隅之外運規爲圓與四隅適相投較量四面方外餘圓各長一尺則其一周共有四尺是謂出於矩耳傳曰不以規矩不能成方圓此之謂也今之學者小九九尚不熟
