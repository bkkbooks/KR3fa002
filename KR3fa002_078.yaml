body:
  text: 趙君卿注曰物有圓方數有奇耦天動為圓其數奇地靜為方其數耦此配隂陽之義非實天地之體也天不可窮而見地不可盡而觀豈能定其圓方乎夫體方則度影正形圓則審實難蓋方者有常而圓者多變故當制法而理之理之法者半周半徑相乘則得方矣雙可周徑相乘四而一又可徑自乘三之四而一又可周自乘十
