body:
  text: 周公曰大哉言數請問用矩之道商高曰平矩以正繩偃矩以望高覆矩以測深臥矩以知達環矩以為圓合矩以為方方屬地圓屬天天圓地方方數為典以方出圓笠以寫天天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位是故知地者智知天者聖智出於句句出於矩夫矩之於數其裁制萬物唯所為耳周公曰善哉
