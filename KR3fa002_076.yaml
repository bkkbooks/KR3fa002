body:
  text: 周公曰大哉言數請問用矩之道商高曰平矩以正繩偃矩以望高覆矩以測深臥矩以知達環矩以爲圓合矩以爲方方屬地圓屬天天圓地方方數爲典以方出圓笠以寫天天青黑地黃赤天數之爲笠也青黑爲表丹黃爲裏以象天地之位是故知地者智知天者聖智出於句句出於矩夫矩之於數其裁制萬物唯所爲耳周公曰善哉
