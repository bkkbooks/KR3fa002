body:
  text: 格物窮理為先務數居六藝之一規矩方圓之至此最易察者而尚莫能辨何況理之玄奧者乎無待運規不拘何等圓器但周徑分明者皆可較耳用紙一條圍器一周均作三折以較其徑顯然不相合矣是知圍三徑一之説姑舉大槩而言非密率也古周髀算經首章載周公與商高相問答此理甚明後人續以圍三徑一之術蓋傳訛也商高所謂圓
