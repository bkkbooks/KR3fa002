body:
  text: 其餘得一爲廣減廣於弦得四即所求股四也此就勾說其倍弦五得十爲廣袤合而令勾股見者以弦五倍之又自乗得一百爲其實乃四因股實十六得六十四以減一百之數開其餘三十六所得六爲差以差六減合十半其餘得二爲廣減廣於弦得三即所求勾三也此就股說右第五段
