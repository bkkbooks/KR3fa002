body:
  text: 載堉圖解曰勾股者筭術之名也其形狀如曲尺幫謂之矩尺身短者勾也尺稍長者股也尺稍至尺身斜絣一線者弦也假如勾三尺股四尺則弦該五尺也既方之外半其一矩環而共盤得成三四五兩矩共長二十有五是謂積矩趙君卿註曰勾股之法先知二數然後推一見勾股然後求弦先各自乗成其實實
