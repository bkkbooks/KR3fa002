body:
  text: 趙君卿註曰其倍弦爲黃袤合而令勾股見者自乗爲其實四實以減之開其餘所得爲差以差減合半其餘爲黃減黃於弦即所求也觀其迭相規矩共爲反覆互爲通分各有所得然則統敘羣倫經稽眾理貫幽入微鉤深致遠故曰其裁制萬物唯所爲之也李淳風註曰謹按列廣袤術宜云倍弦五
