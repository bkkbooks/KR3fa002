body:
  text: 載堉圖解曰今有方池一所每面方七尺欲要改爲圓池問圓池周徑各幾何荅曰周三丈一尺一寸一分一釐一毫一絲一忽一微徑九尺八寸九分九釐四毫九絲四忽九微二纖法曰置方七尺以四十乗之九歸得三丈一尺一寸一分有奇卽周又置方七尺以一尺四寸一分四釐二毫一絲三忽五微六纖乗之一尺除之所得卽徑
