body:
  text: 載堉圖解曰今有方池一所每面方三尺欲要改爲圓池問圓池周徑各幾何荅曰周一丈三尺三寸三分三釐三毫三絲三忽三微徑四尺二寸四分二釐六毫四絲忽六微八纖法曰置方三尺以四十乗之九歸得一丈三尺三寸三分有奇卽周又置方三尺以一尺四寸一分四釐二毫一絲三忽五微六纖乗之一尺除之所得卽徑
