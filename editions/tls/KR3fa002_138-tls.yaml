body:
  text: 爲股之廣所謂廣袤差者勾廣一而袤九股廣二而袤八廣袤相減之餘也載堉圖解曰此一段當分作兩條解之先就勾説次就股説詳見下文其倍弦五得十爲廣袤合而令勾股見者以弦五倍之又自乗得一百爲其實乃四因勾實九得三十六以減一百之數開其餘六十四所得八爲差以差八減合十半
