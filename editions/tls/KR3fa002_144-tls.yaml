body:
  text: 嬰註周髀一卷甄鸞註周髀一卷其曆筭類仍有李淳風註周髀筭經二卷本此一書耳至於本朝崇文總目與夫中興館閣書目皆有周髀筭經二卷云趙君卿述甄鸞重述李淳風等註釋趙君卿名爽君卿其字也如是則在唐以前則有趙嬰之註而本朝以來則是趙爽之本所記不同意者趙嬰趙爽止是一人豈其字文相類轉
