body:
  text: 周髀序後漢趙君卿撰夫高而大者莫大於天厚而廣者莫廣於地體恢宏而廓落形脩廣而幽清可以玄象課其進退然而弘遠不可指掌也可以晷儀驗其長知然而巨闊不可度量也雖窮神知化不能極其妙探賾索隱不能盡其微是以詭異之説出則兩端之理生遂有渾天蓋天兼
