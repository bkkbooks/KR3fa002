body:
  text: 較者是也股弦幷即今筭家所謂股弦和者是也廣者短而闊者也袤者長而曲者也餘詳下文勾實之矩九以股弦差一爲廣股弦幷九爲袤而股實十六方其裏減矩勾之實九於弦實二十五開其餘十六即股四倍股四在兩邊爲從法入開矩勾之角九得一即股弦差加差一於股四爲弦五以差一
