body:
  text: 載堉圖解曰今有方池一所每面方六尺欲要改爲圓池問圓池周徑各幾何荅曰周二丈六尺六寸六分六釐六毫六絲六忽六微徑八尺四寸八分五釐二毫八絲一忽三微六纖法曰置方六尺以四十乗之九歸得二丈六尺六寸六分有奇卽周又置方六尺以一尺四寸一分四釐二毫一絲三忽五微六纖乗之一尺除之所得卽徑
