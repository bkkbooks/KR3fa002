body:
  text: 趙君卿註曰勾實之矩以股弦差爲廣股弦幷爲袤而股實方其裏減矩勾之實於弦實開其餘即股倍股在兩邊爲從法開矩勾之角即股弦差加股爲弦以差除勾實得股弦幷以幷除勾實亦得股弦差令幷自乗與勾實爲實倍幷爲法所得亦弦色實減幷自乗如法爲股載堉圖解曰股弦差即今筭家所謂股弦
