body:
  text: 或有不曉者而問於余余以筭書所稱甲乙丙丁四人喻之遂悟曰恐是以色界書故曰青實等耳余以爲然乃用三色紙而奇中尤奇庶幾便於初學也鳴呼句股一術雖在九章之末實爲筭術之本以方測圓而弧矢之妙在是矣初學由此漸入佳境不可以其淺近而忽之也是故列於弧矢真理之前爲弧矢之發軔也歟句曲山人跋
  hash: sha256:982ca99a86551a1bb17650f5d9ff6c4bbdd6129a9416584021c735974b3269e2
