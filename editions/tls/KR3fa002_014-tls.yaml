body:
  text: 一蓋天之學固疎於渾天然而中間以方測圓一節實是玄妙不可以其所短棄其所長也況一切筭書泥於圍三徑一疎舛之率雖劉徽主蕃祖沖之輩素號知筭創制密率名密實疎不如周髀所載實乃古法以其深奧世莫能曉雖趙君卿李淳風等尚未究其根柢沖之輩
