body:
  text: 趙君卿註曰按弦圖又可以勾股相乗爲朱實二倍之爲朱實四以勾股之差自相乗爲中黃實加差實亦成弦實以差實減弦實半其餘以差爲從法開方除之復得勾矣加差於勾即股凡幷勾股之實即成弦實或矩於內或方於外形詭而量均體殊而數齊載堉圖解曰按君即古註文義深奧讀者
