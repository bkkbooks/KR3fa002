body:
  text: 宋鮑澣之撰周髀筭徑二卷古蓋天之學也以勾股之法度天地之高厚推日月之運行而得其度數其書出於商周之間自周公受之於商高周人志之謂之周髀其所從來達矣隋書經籍志有周髀一卷趙嬰註周髀一卷甄鸞重述而唐之藝文志天文類有趙
