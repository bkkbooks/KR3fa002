body:
  text: 以黃筆界書故名加差實一於兩箇朱實內亦成弦實二十五以差實一減弦實二十五半其餘得一十二以差一爲從法開方除之復得三即勾矣加差一於勾三即股四凡幷勾股各自乗之實即成弦實共二十五或矩於內或方於外形詭而量均體殊而數齊此四句解見後二段右第一段
