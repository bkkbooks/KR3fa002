body:
  text: 或有不曉者而問於余余以算書所稱甲乙丙丁四人喻之遂悟曰恐是以色界書故曰青實等耳余以為然乃用三色紙而奇中尤奇庶幾便於初學也鳴呼句股一術雖在九章之末實為算術之本以方測圓而弧矢之妙在是矣初學由此漸入佳境不可以其淺近而忽之也是故列於弧矢真理之前為弧矢之發軔也歟句曲山人跋
