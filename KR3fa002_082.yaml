body:
  text: 面皆十寸一周共計四十寸用紙條絜圓一匝絜方一匝看餘幾寸若餘四寸是與筭合此乃周公所造密率之源流也萬曆庚戌余年七十五自三月至七月信手握筆著此三書以成一家之言其一曰律呂正論其二曰嘉量筭經其三曰圓方圖解皆樂律書所未載者圓方圖解卷終
