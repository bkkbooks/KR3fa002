body:
  text: 載堉圖解曰今有方池一所每面方四尺欲要改爲圓池問圓池周徑各幾何荅曰周一丈七尺七寸七分七釐七毫七絲七忽七微徑五尺六寸五分六釐八毫五絲四忽二微四纖法曰置方四尺以四十乗之九歸得一丈七尺七寸七分有奇卽周又置方四尺以一尺四寸一分四釐二毫一絲三忽五微六纖乗之一尺除之所得卽徑
