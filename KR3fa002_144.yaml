body:
  text: 嬰注周髀一卷甄鸞注周髀一卷其曆算類仍有李淳風注周髀算經二卷本此一書耳至於本朝崇文總目與夫中興館閣書目皆有周髀算經二卷云趙君卿述甄鸞重述李淳風等注釋趙君卿名爽君卿其字也如是則在唐以前則有趙嬰之注而本朝以來則是趙爽之本所記不同意者趙嬰趙爽止是一人豈其字文相類轉
