body:
  text: 載堉圖解曰今有方池一所每面方八尺欲要改為圓池問圓池周徑各幾何答曰周三丈五尺五寸五分五釐五毫五絲五忽五微徑一丈一尺三寸一分三釐七毫絲八忽四微法曰置方八尺以四十乘之九歸得三丈五尺五寸五分有奇即周又置方八尺以一尺四寸一分四釐二毫一絲三忽五微六纖乘之一尺除之所得即徑
