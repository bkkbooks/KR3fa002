body:
  text: 為勾加差於並而半之為股載堉圖解曰此段總説上文三段之意兩差勾股差一勾弦差二相乘一二如二倍而為四開之所得二以股弦差一增之為勾三以勾弦差二增之為股四兩差一二增之為弦五倍弦實二十五得五十列勾股差實一見弦實二十五者以圖考之倍弦實得五十滿外大方四十九而多黃
