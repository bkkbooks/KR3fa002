body:
  text: 寫之誤耶然亦當以隋唐之書為正可也又崇文總目及李籍周髀音義皆云趙君卿不詳何代人今以序文考之有曰渾天有靈憲之文蓋天有周髀之法靈憲乃張衡之所作實後漢安順之世而甄鸞之重述者乃是解釋君卿之所注出於宇文周之世以此推之則君卿者其亦晉之間人乎若夫乘勾股朱黃之實立倍差減並
