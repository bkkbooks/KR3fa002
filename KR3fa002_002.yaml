body:
  text: 後學載堉著圓方句股之説出於古周髀算經者周公之遺書也舊有圖解若干趙君卿所撰也新增圖解若干余所撰也夫新增者何為而作耶余觀諸家算術最疏謬者莫如圓田之屬蓋彼尊信圍三徑一舊率而執守之不肯運一規於壁間以尺量之較其是否儒者之學以
