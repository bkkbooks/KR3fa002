body:
  text: 方圓密率算術周徑羃積相求周求徑者置周全數九因四十除之所得自乘倍之為實開平方法除之得徑徑求周者置徑全數自乘半之為實開平方法除之所得四十乘之九歸得周周求面羃者置周全數九因四十除之所得自乘倍之為實又自乘畢以一百乘之一百六十二除之所得為實開平方法除之得面羃
