  text: 方圓密率筭術周徑羃積相求周求徑者置周全數九因四十除之所得自乗倍之爲實開平方法除之得徑徑求周者置徑全數自乗半之爲實開平方法除之所得四十乗之九歸得周周求面羃者置周全數九因四十除之所得自乗倍之爲實又自乘畢以一百乗之一百六十二除之所得爲實開平方法除之得面羃
