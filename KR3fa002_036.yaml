body:
  text: 載堉圖解曰今有方池一所每面方一尺欲要改為圓池問圓池周徑各幾何答曰周四尺四寸四分四釐四毫四絲四忽四微四纖徑一尺四寸一分四釐二毫一絲三忽五微六纖法曰置方一尺以四十乘之九歸得四尺四寸四分有奇即周又置方一尺以一尺四寸一分四釐二毫一絲三忽五微六纖乘之一尺除之所得即徑
