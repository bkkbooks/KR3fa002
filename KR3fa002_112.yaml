body:
  text: 趙君卿注曰股實之矩以勾弦差為廣勾弦並為袤而勾實方其裏減矩股之實於矩股之角即勾弦差加勾為弦以差除股實得勾弦並以並除股實亦得勾弦差令並自乘與股實為實倍並為法所得亦弦股實減並自乘如法為勾載堉圖解曰勾弦差即今算家所謂勾弦
