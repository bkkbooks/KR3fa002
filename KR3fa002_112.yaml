body:
  text: 趙君卿註曰股實之矩以勾弦差爲廣勾弦幷爲袤而勾實方其裏減矩股之實於矩股之角即勾弦差加勾爲弦以差除股實得勾弦幷以幷除股實亦得勾弦差令幷自乗與股實爲實倍幷爲法所得亦弦股實減幷自乗如法爲勾載堉圖解曰勾弦差即今筭家所謂勾弦
