body:
  text: 豈能識之歟今擇圓方筭率一段而表章之以爲圓方密率之本源也一君卿舊註煩者刪之斷者續之不必盡依舊註一除圓內容方筭率外凡係天文曆法今並不述一舊有圖若干新添圖若干各隨經文次序列之
