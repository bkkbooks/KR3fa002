body:
  text: 而並之故能彌綸天地之道有以見天地之賾則渾天有靈憲之文蓋天有周髀之法累代存之官司是掌所以欽若昊天恭授民時爽以暗蔽才學淺昧憐高山之仰止慕景行之軌轍負薪餘日聊觀周髀其旨約而遠其言曲而中將恐廢替濡滯不通使談天者無所取則輒依經爲圖仍冀頺毀重級之牆披露堂室之奧庶博物君子時逈思焉
