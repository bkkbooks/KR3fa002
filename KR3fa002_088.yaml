body:
  text: 成勢化外乃變通故曰既方其外或幷勾股之實以求弦實之中乃求勾股之分幷實不正等更相取與互有所得故曰半其一矩其術勾股各自乗三三如九四四一十六幷爲弦自乗之實二十五減勾於弦爲股之實一十六減股於弦爲勾之實九兩矩者勾股各自乗之實共長者幷實之數將以施於萬事而此先陳其率也
