body:
  text: 之術以盡開方之妙百世之下莫之可易則君卿者誠算學之宗師也嘉定六年癸酉十一月一日丁卯冬至承議郎權知汀州軍州兼管內勸農事主管坑冶括蒼鮑浣之仲祺謹書載堉曰齊有晏嬰漢有灌嬰皆大臣也故趙嬰字君卿蓋取此也以此證之爽字誤無疑矣
