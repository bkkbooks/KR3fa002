body:
  text: 載堉圖解曰今有方池一所每面方二尺欲要改為圓池問圓池周徑各幾何答曰周八尺八寸八分分釐八毫八絲八忽八微八纖徑二尺八寸二分八釐四毫二絲七忽一微二纖法曰置方二尺以四十乘之九歸得八尺八寸八分有奇即周又置方二尺以一尺四寸一分四釐二毫一絲三忽五微六纖乘之一尺除之所得即徑
