body:
  text: 趙君卿注曰其倍弦為黃袤合而令勾股見者自乘為其實四實以減之開其餘所得為差以差減合半其餘為黃減黃於弦即所求也觀其迭相規矩共為反覆互為通分各有所得然則統敘羣倫經稽衆理貫幽入微鉤深致遠故曰其裁制萬物唯所為之也李淳風注曰謹按列廣袤術宜云倍弦五
