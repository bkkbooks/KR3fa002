body:
  text: 辟如行遠必自邇辟如登高必自卑蓋名言哉句股筭術本非難曉人多以爲難曉何也學之躐等而非循序故也愚按九章筭術所載句股備矣然於初學無所利益惟古周髀筭經所謂句爲青實股爲黃實弦爲朱實者名義有可取蓋青者象天也黃者象地也朱者象人也取名初無別義聊以識別三實耳
