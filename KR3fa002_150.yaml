body:
  text: 辟如行遠必自邇辟如登高必自卑蓋名言哉句股算術本非難曉人多以為難曉何也學之躐等而非循序故也愚按九章算術所載句股備矣然於初學無所利益惟古周髀算經所謂句為青實股為黃實弦為朱實者名義有可取蓋青者象天也黃者象地也朱者象人也取名初無別義聊以識別三實耳
