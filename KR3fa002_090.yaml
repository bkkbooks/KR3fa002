body:
  text: 載堉圖解曰按經文作既方之外而註文作既方其外之其二字不同必有一誤疑之者誤也其者是也既方其外者言勾實股實弦實三者外面皆方所謂羃也羃者方之義也註文當作或併勾股之實以求弦實弦實之中乃求勾股之分併也此處該重弦實二字原文脫去止存二字讀之文義不相接矣
