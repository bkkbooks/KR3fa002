body:
  text: 載堉圖解曰今有方池一所每面方一丈欲要改為圓池問圓池周徑各幾何答曰周四丈四尺四寸四分四釐四毫四絲四忽四微徑一丈四尺一寸四分二釐一毫三絲五忽六微法曰置方一丈以四十乘之九歸得四丈四尺四寸四分有奇即周又置方一丈以一尺四寸一分四釐二毫一絲三忽五微六幾乘之一尺除之所得即徑
