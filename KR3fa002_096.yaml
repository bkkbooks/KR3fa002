body:
  text: 難曉茲以愚見通俗直説使人易曉分作五段解之大字者即趙氏本文也小字者新添箋註也按弦圖即前大方圖也又可以勾三股四相乗得一十二名爲朱實蓋用朱筆界書故名二次倍之得四十八是爲朱實一十二者四箇也以勾三股四相減之所餘一名日差差自相乗一一如一爲中黃實一
