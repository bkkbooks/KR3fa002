body:
  text: 難曉茲以愚見通俗直説使人易曉分作五段解之大字者即趙氏本文也小字者新添箋注也按弦圖即前大方圖也又可以勾三股四相乘得一十二名為朱實蓋用朱筆界書故名二次倍之得四十八是為朱實一十二者四箇也以勾三股四相減之所餘一名日差差自相乘一一如一為中黃實一
