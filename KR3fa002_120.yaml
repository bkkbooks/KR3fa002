body:
  text: 趙君卿注曰兩差相乘倍而開之所得以股弦差增之為勾以勾弦差增之為股兩差增之為弦倍弦實列勾股差實見弦實者以圖考之倍弦實滿外大方而多黃實黃實之多即勾股差實以差實減之開其餘得外大方外大方之面即勾股並也冷並自乘倍弦實乃減之開其餘得中黃方中黃方之面即勾股差以差減並而半之
  hash: sha256:6fa35503b39c36addbe317979b2f19e05bb562ec32b20f96dcdb9ba0ad3d7292
