body:
  text: 趙君卿註曰兩差相乗倍而開之所得以股弦差增之爲勾以勾弦差增之爲股兩差增之爲弦倍弦實列勾股差實見弦實者以圖考之倍弦實滿外大方而多黃實黃實之多即勾股差實以差實減之開其餘得外大方外大方之面即勾股幷也冷幷自乗倍弦實乃減之開其餘得中黃方中黃方之面即勾股差以差減幷而半之
