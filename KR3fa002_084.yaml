body:
  text: 古周髀筭經圖解後漢趙君卿註後學載堉圖解周髀經文曰故折矩以爲勾廣三股修四徑隅五趙君卿註曰將爲勾股之率故曰折矩也橫者謂之廣勾亦廣廣短也從者謂之修股亦修修長也徑直隅角也亦謂之弦
