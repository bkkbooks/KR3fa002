body:
  text: 何況以語其圓率之疎密也哉卽有通筭者亦以爲丈量田地不過得其大略摠差一二步何妨也殊不知聖人設此術豈專爲圓田耶大而璇璣玉衡小而黃鐘玉琯凡爲圓器必求周徑豈容一秒一忽而有錯誤寧於求圓之謬而竟不之察乎今編此書難採古人成説而獨詳於求圓一事蓋欲微顯闡幽補其闕略而已
