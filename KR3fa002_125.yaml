body:
  text: 實一黃實一之多即勾股差實一以差實一減之五十開其餘四十九得外大方外大方之面即勾股幷七也令幷七自乗得四十九倍弦實二十五爲五十乃以四十九減之開其餘一得中黃方一中黃方一之面即勾股差一以差一減幷七而半之得三爲勾加差一於幷七而半多得四爲股右第四段
