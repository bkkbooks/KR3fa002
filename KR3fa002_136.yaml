body:
  text: 減合十餘二四半之得一二一即股弦差二即勾弦差以差減弦倍之即廣袤差也唐寅箋注曰大方之中有四弦實故四其勾實得三十六減之餘六十四開得八為勾之廣袤差四其股實得六十四減之餘三十六開得六為股之廣袤差以勾之廣袤差八減廣袤合十餘二半之為勾之廣以股之廣袤差六減廣袤合十餘四半之
