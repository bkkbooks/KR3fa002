body:
  text: 商高曰數之法出於圓方圓出於方方出於矩矩出於九九八十一趙君卿注曰圓方者天地之形陰陽之數圓規之數理之以方方同匝也方正之物出之以矩矩廣長也推圓方之率適廣長之數須乘除以計之九九者乘除之原也又曰此言求圓於方之法萬物周事而圓方用焉大匠造制而規矩設焉或毀方而
