body:
  text: 徑求面羃者置徑全數自乗爲實又自乗畢一百乗之一百六十二除之所得爲實開平方法除之得面羃面羃求周及徑者置面羃全數自乗所得一百六十二乗之一百除之爲實開平方法除之所得副置其一折半爲實開平方法除之所得四十乗之九歸得周其一則不折半但以開平方法除之得徑此乃周公所撰而筭家失其傳故表出之
