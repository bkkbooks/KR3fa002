body:
  text: 其餘得一為廣減廣於弦得四即所求股四也此就勾説其倍弦五得十為廣袤合而令勾股見者以弦五倍之又自乘得一百為其實乃四因股實十六得六十四以減一百之數開其餘三十六所得六為差以差六減合十半其餘得二為廣減廣於弦得三即所求勾三也此就股説右第五段
