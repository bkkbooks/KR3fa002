body:
  text: 得十爲廣袤合令自乗者十自乗得一百四實者大方廣袤之中有四方若據勾實而言一方之中有實九四實有三十六減上一百餘六十四開之得八即廣袤差此是股弦差減股弦幷餘數也若據股實而言一方之中有實十六四實有六十四減上一百餘三十六開之得六即廣袤差此是勾弦差減勾弦幷餘數也以差八六各
