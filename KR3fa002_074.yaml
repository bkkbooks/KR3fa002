body:
  text: 巳上十圖皆係新添世俗視之淡然無味達者觀之有無窮之味焉其容方五及容方十得河圖之中數周公嘉量所自出也惟容方九乃乾卦之陽數配以四十坤卦老隂之數故無餘分此尤妙中至妙者也容方八者祖沖之所造疏淺率出於此也一百一十三三百五十五皆有餘分沖之削去是以疏淺以此證彼其謬可知也
