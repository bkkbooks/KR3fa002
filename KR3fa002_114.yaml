body:
  text: 較者是也勾弦幷即今筭家所謂勾弦和者是也此叚大槩與上叚同而其所不同者勾與股二字也股實之矩十六以勾弦差二爲廣勾弦幷八爲袤而勾實九方其裏減矩股之實十六於弦實二十五開其餘九即勾三倍勾三在兩邊爲從法六開矩股之角十六得二即勾弦差加差二於勾三爲弦五以差
